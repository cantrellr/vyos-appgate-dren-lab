#cloud-config
hostname: dc1manager-ctrl01
write_files:
  - path: /etc/hosts
    content: |
      127.0.0.1 localhost
      10.1.4.131 dc1manager-ctrl01

network:
  version: 2
  ethernets:
    eth0:
      dhcp4: false
      addresses: [10.1.4.131/24]
      gateway4: 10.1.4.1
      nameservers:
        addresses: [10.1.4.2]
    eth1:
      dhcp4: false
      addresses: [172.16.10.101/24]
    eth2:
      dhcp4: false
      addresses: [192.168.1.131/24]
    eth3:
      dhcp4: false
      addresses: [1.1.0.131/25]

runcmd:
  - curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE="server" sh -
  - systemctl enable rke2-server.service
  - systemctl start rke2-server.service
  - mkdir -p /etc/rancher/rke2
  - cat > /etc/rancher/rke2/config.yaml <<'EOF'
node-label:
  - "node-role.kubernetes.io/control-plane=true"
  - "node-role.kubernetes.io/worker=true"
service-cidr: 10.93.0.0/16
cluster-cidr: 10.243.0.0/16
EOF

final_message: "dc1manager-ctrl01 cloud-init applied"
