apiVersion: rkeprep/v2
kind: Server
metadata:
  name: dc1manager-ctrl01
spec:
  hostname: dc1manager-ctrl01
  nodeIp: 10.1.4.131
  bindAddress: 10.1.4.131
  advertiseAddress: 10.1.4.131
  cni:
    - multus
    - canal
  interfaces:
    - name: eth0
      ip: 10.1.4.131
      prefix: 24
      gateway: 10.1.4.1
      dns: ["10.1.4.2"]
    - name: eth1
      ip: 172.16.10.101
      prefix: 24
    - name: eth2
      ip: 192.168.1.131
      prefix: 24
    - name: eth3
      ip: 1.1.0.131
      prefix: 25
  node-label:
    - "node-role.kubernetes.io/control-plane=true"
    - "node-role.kubernetes.io/worker=true"
  node-taint:
    - "node-role.kubernetes.io/control-plane:NoSchedule"
  tls-san:
    - dc1manager-ctrl01
    - dc1manager-ctrl01.dev.kube
    - dc1manager-cluster
    - dc1manager-cluster.dev.kube
    - 10.1.4.131
  cluster-domain: cluster.local
  enable-servicelb: "false"
  embedded-registry: true
  disable-default-registry-endpoint: true
  kube-apiserver-arg:
    - "audit-log-maxage=15"
  disable:
    - rke2-ingress-nginx
    - rke2-ingress-traefik
  customCA:
    rootCrt: /rke2-node-init/configs/preprod/certs/root-ca.crt
    rootKey: /rke2-node-init/configs/preprod/certs/root-ca-key.pem
    installToOSTrust: true
  service-cidr: 10.93.0.0/16
  cluster-cidr: 10.243.0.0/16
  tokenFile: /rke2-node-init/outputs/dc1manager-ca-bootstrap-token.txt
