apiVersion: rkeprep/v2
kind: Server
metadata:
  name: r01domain-ctrl01
spec:
  hostname: r01domain-ctrl01
  nodeIp: 10.3.4.181
  bindAddress: 10.3.4.181
  advertiseAddress: 10.3.4.181
  cni:
    - multus
    - canal
  interfaces:
    - name: eth0
      ip: 10.3.4.181
      prefix: 24
      gateway: 10.3.4.1
      dns: ["10.3.4.2"]
    - name: eth1
      ip: 172.16.30.123
      prefix: 24
    - name: eth2
      ip: 192.168.3.181
      prefix: 24
    - name: eth3
      ip: 1.3.0.181
      prefix: 24
  node-label:
    - "node-role.kubernetes.io/control-plane=true"
    - "node-role.kubernetes.io/worker=true"
  node-taint:
    - "node-role.kubernetes.io/control-plane:NoSchedule"
  tls-san:
    - r01domain-ctrl01
    - r01domain-ctrl01.dev.kube
    - r01domain-cluster
    - r01domain-cluster.dev.kube
    - 10.3.4.181
  cluster-domain: cluster.local
  enable-servicelb: "false"
  embedded-registry: true
  disable-default-registry-endpoint: true
  kube-apiserver-arg:
    - "audit-log-maxage=15"
  disable:
    - rke2-ingress-nginx
    - rke2-ingress-traefik
  customCA:
    rootCrt: /rke2-node-init/configs/preprod/certs/root-ca.crt
    rootKey: /rke2-node-init/configs/preprod/certs/root-ca-key.pem
    installToOSTrust: true
  service-cidr: 10.98.0.0/16
  cluster-cidr: 10.248.0.0/16
  tokenFile: /rke2-node-init/outputs/r01domain-ca-bootstrap-token.txt