apiVersion: rkeprep/v2
kind: Agent
metadata:
  name: j64domain-work01
spec:
  hostname: j64domain-work01
  nodeIp: 10.1.4.142
  bindAddress: 10.1.4.142
  advertiseAddress: 10.1.4.142
  cni:
    - multus
    - canal
  interfaces:
    - name: eth0
      ip: 10.1.4.142
      prefix: 24
      gateway: 10.1.4.1
      dns: ["10.1.4.2"]
    - name: eth1
      ip: 172.16.10.110
      prefix: 24
    - name: eth2
      ip: 192.168.1.142
      prefix: 24
    - name: eth3
      ip: 1.1.0.142
      prefix: 24
  serverURL: https://10.1.4.141:9345
  tokenFile: /rke2-node-init/outputs/j64domain-ca-bootstrap-token.txt
  node-label:
    - "role=worker"
    - "env=home-lab"
  customCA:
    rootCrt: /rke2-node-init/configs/preprod/certs/root-ca.crt
    rootKey: /rke2-node-init/configs/preprod/certs/root-ca-key.pem
    installToOSTrust: true
  disable:
    - rke2-ingress-nginx
    - rke2-ingress-traefik