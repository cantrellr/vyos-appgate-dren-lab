apiVersion: rkeprep/v2
kind: Agent
metadata:
  name: r01domain-work01
spec:
  hostname: r01domain-work01
  nodeIp: 10.3.4.182
  bindAddress: 10.3.4.182
  advertiseAddress: 10.3.4.182
  cni:
    - multus
    - canal
  interfaces:
    - name: eth0
      ip: 10.3.4.182
      prefix: 24
      gateway: 10.3.4.1
      dns: ["10.3.4.2"]
    - name: eth1
      ip: 172.16.30.124
      prefix: 24
    - name: eth2
      ip: 192.168.3.182
      prefix: 24
    - name: eth3
      ip: 1.3.0.182
      prefix: 24
  serverURL: https://10.3.4.181:9345
  tokenFile: /rke2-node-init/outputs/r01domain-ca-bootstrap-token.txt
  node-label:
    - "role=worker"
    - "env=home-lab"
  customCA:
    rootCrt: /rke2-node-init/configs/preprod/certs/root-ca.crt
    rootKey: /rke2-node-init/configs/preprod/certs/root-ca-key.pem
    installToOSTrust: true
  disable:
    - rke2-ingress-nginx
    - rke2-ingress-traefik