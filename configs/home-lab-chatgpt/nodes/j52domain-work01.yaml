apiVersion: rkeprep/v2
kind: Agent
metadata:
  name: j52domain-work01
spec:
  hostname: j52domain-work01
  nodeIp: 10.2.4.162
  bindAddress: 10.2.4.162
  advertiseAddress: 10.2.4.162
  cni:
    - multus
    - canal
  interfaces:
    - name: eth0
      ip: 10.2.4.162
      prefix: 24
      gateway: 10.2.4.1
      dns: ["10.2.4.2"]
    - name: eth1
      ip: 172.16.20.117
      prefix: 24
    - name: eth2
      ip: 192.168.2.162
      prefix: 24
    - name: eth3
      ip: 1.2.0.162
      prefix: 24
  serverURL: https://10.2.4.161:9345
  tokenFile: /rke2-node-init/outputs/j52domain-ca-bootstrap-token.txt
  node-label:
    - "role=worker"
    - "env=home-lab"
  customCA:
    rootCrt: /rke2-node-init/configs/preprod/certs/root-ca.crt
    rootKey: /rke2-node-init/configs/preprod/certs/root-ca-key.pem
    installToOSTrust: true
  disable:
    - rke2-ingress-nginx
    - rke2-ingress-traefik