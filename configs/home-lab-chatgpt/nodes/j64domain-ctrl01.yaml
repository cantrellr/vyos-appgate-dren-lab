apiVersion: rkeprep/v2
kind: Server
metadata:
  name: j64domain-ctrl01
spec:
  hostname: j64domain-ctrl01
  nodeIp: 10.1.4.141
  bindAddress: 10.1.4.141
  advertiseAddress: 10.1.4.141
  cni:
    - multus
    - canal
  interfaces:
    - name: eth0
      ip: 10.1.4.141
      prefix: 24
      gateway: 10.1.4.1
      dns: ["10.1.4.2"]
    - name: eth1
      ip: 172.16.10.109
      prefix: 24
    - name: eth2
      ip: 192.168.1.141
      prefix: 24
    - name: eth3
      ip: 1.1.0.141
      prefix: 24
  node-label:
    - "node-role.kubernetes.io/control-plane=true"
    - "node-role.kubernetes.io/worker=true"
  node-taint:
    - "node-role.kubernetes.io/control-plane:NoSchedule"
  tls-san:
    - j64domain-ctrl01
    - j64domain-ctrl01.dev.kube
    - j64domain-cluster
    - j64domain-cluster.dev.kube
    - 10.1.4.141
  cluster-domain: cluster.local
  enable-servicelb: "false"
  embedded-registry: true
  disable-default-registry-endpoint: true
  kube-apiserver-arg:
    - "audit-log-maxage=15"
  disable:
    - rke2-ingress-nginx
    - rke2-ingress-traefik
  customCA:
    rootCrt: /rke2-node-init/configs/preprod/certs/root-ca.crt
    rootKey: /rke2-node-init/configs/preprod/certs/root-ca-key.pem
    installToOSTrust: true
  service-cidr: 10.94.0.0/16
  cluster-cidr: 10.244.0.0/16
  tokenFile: /rke2-node-init/outputs/j64domain-ca-bootstrap-token.txt